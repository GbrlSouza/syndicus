name: Version Badge

on:
  push:
    branches:
      - main

jobs:
  update-version:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create JSON
        run: |
          mkdir -p .github/badges
          echo '{
            "schemaVersion": 1,
            "label": "version",
            "message": "${{ steps.version.outputs.version }}",
            "color": "blue"
          }' > .github/badges/version.json

      - name: Commit badge
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com

          git add .github/badges/version.json

          git diff --cached --quiet || git commit -m "update version badge"

          git push
