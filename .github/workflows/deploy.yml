# Incrementa VERSION, envia arquivos para /htdocs na InfinityFree
name: Deploy Syndicus

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ftp_password:
        description: 'Senha FTP (opcional — use só para teste se o secret falhar)'
        required: false
        type: string

concurrency:
  group: deploy-syndicus
  cancel-in-progress: true

env:
  FTP_HOST: ftpupload.net
  FTP_USERNAME: if0_42073908
  FTP_PORT: 21

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    environment: syndicus-deploy

    permissions:
      contents: write

    steps:
      - name: Verificar senha FTP
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          INPUT="${{ github.event.inputs.ftp_password }}"
          if [ -z "$FTP_PASSWORD" ] && [ -z "$INPUT" ]; then
            echo "::error::Senha FTP não disponível no runner."
            echo ""
            echo "Configure UMA das opções:"
            echo "  A) Settings → Environments → syndicus-deploy → Environment secrets → FTP_PASSWORD"
            echo "  B) Settings → Secrets and variables → Actions → Repository secrets → FTP_PASSWORD"
            echo "  C) Actions → Run workflow → preencha o campo 'Senha FTP' (teste manual)"
            exit 1
          fi
          echo "Senha FTP detectada."

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: version
        run: |
          CURRENT=$(tr -d '[:space:]' < VERSION)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "$NEW_VERSION" > VERSION
          echo "previous=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Versão: $CURRENT → $NEW_VERSION"

      - name: Deploy to InfinityFree (FTP → /htdocs)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.FTP_HOST }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ github.event.inputs.ftp_password != '' && github.event.inputs.ftp_password || secrets.FTP_PASSWORD }}
          port: ${{ env.FTP_PORT }}
          protocol: ftp
          local-dir: ./
          server-dir: /htdocs/
          exclude: |
            **/.git*
            **/.github/**
            **/.gitignore
            **/DEPLOY.md
            **/README.md
            **/LICENSE
            **/.env
            **/app/.env
            **/.ftp-deploy-sync-state.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: release v${{ steps.version.outputs.new }} [skip ci]"
          git push
