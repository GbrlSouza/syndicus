# Incrementa VERSION, envia arquivos para /htdocs na InfinityFree
name: Deploy Syndicus

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ftp_password:
        description: 'Senha FTP da InfinityFree (obrigatório no run manual)'
        required: true
        type: string

concurrency:
  group: deploy-syndicus
  cancel-in-progress: true

env:
  FTP_HOST: ftpupload.net
  FTP_USERNAME: if0_42073908
  FTP_PORT: 21

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Verificar senha FTP
        env:
          FTP_SECRET: ${{ secrets.FTP_PASSWORD }}
          FTP_VARIABLE: ${{ vars.FTP_PASSWORD }}
        run: |
          INPUT="${{ github.event.inputs.ftp_password }}"
          if [ -n "$INPUT" ]; then
            echo "::add-mask::$INPUT"
            echo "origem=input manual"
          elif [ -n "$FTP_SECRET" ]; then
            echo "origem=secret FTP_PASSWORD"
          elif [ -n "$FTP_VARIABLE" ]; then
            echo "origem=variable FTP_PASSWORD (prefira Secret por segurança)"
          else
            echo "::error::Senha FTP não chegou ao GitHub Actions."
            echo ""
            echo "Você criou em VARIABLES em vez de SECRETS? Isso é o erro mais comum."
            echo ""
            echo "Correto: Settings → Secrets and variables → Actions"
            echo "  aba: Repository secrets → New repository secret"
            echo "  Name: FTP_PASSWORD"
            echo ""
            echo "Ou rode manualmente: Actions → Deploy Syndicus → Run workflow"
            echo "  (preencha o campo Senha FTP — obrigatório no manual)"
            exit 1
          fi
          echo "Senha FTP OK."

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' 
          tools: composer:v2

      - name: Install Dependencies (Composer)
        run: composer install --no-dev --optimize-autoloader --no-progress --no-interaction

      - name: Bump patch version
        id: version
        run: |
          CURRENT=$(tr -d '[:space:]' < VERSION)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "$NEW_VERSION" > VERSION
          echo "previous=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Versão: $CURRENT → $NEW_VERSION"

      - name: Deploy to InfinityFree (FTP → /htdocs)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.FTP_HOST }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ github.event.inputs.ftp_password || secrets.FTP_PASSWORD || vars.FTP_PASSWORD }}
          port: ${{ env.FTP_PORT }}
          protocol: ftp
          local-dir: ./
          server-dir: /htdocs/
          exclude: |
            **/.git*
            **/.github/**
            **/.gitignore
            **/DEPLOY.md
            **/README.md
            **/LICENSE
            **/.env
            **/app/.env
            **/.ftp-deploy-sync-state.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: release v${{ steps.version.outputs.new }} [skip ci]"
          git push
